version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shop-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Sifre123_Guclu!
    ports:
      - "1433:1433"
    networks:
      - shop-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: shop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - shop-network

  seq:
    image: datalust/seq:latest
    container_name: shop-seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"
    networks:
      - shop-network

networks:
  shop-network:
    driver: bridge